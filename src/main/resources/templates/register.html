<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card wide">
        <p class="eyebrow">Alta de usuarios</p>
        <h1>Crear cuenta</h1>
        <p class="subtitle">El sistema guarda la contraseña con BCrypt y asigna el rol USER por defecto.</p>

        <div class="alert error" th:if="${registrationError}" th:text="${registrationError}"></div>

        <form th:action="@{/register}" th:object="${registrationForm}" method="post" class="form-grid two-columns">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                <span>Usuario</span>
                <input type="text" th:field="*{username}" placeholder="usuario" required>
                <small th:errors="*{username}" class="field-error"></small>
            </label>
            <label>
                <span>Nombre completo</span>
                <input type="text" th:field="*{fullName}" placeholder="Nombre completo" required>
                <small th:errors="*{fullName}" class="field-error"></small>
            </label>
            <label>
                <span>Email</span>
                <input type="email" th:field="*{email}" placeholder="correo@dominio.com" required>
                <small th:errors="*{email}" class="field-error"></small>
            </label>
            <label>
                <span>Contraseña</span>
                <input type="password" th:field="*{password}" placeholder="Mínimo 8 caracteres" required>
                <small th:errors="*{password}" class="field-error"></small>
            </label>
            <button type="submit" class="primary-btn full-width">Registrar</button>
        </form>

        <p class="helper">¿Ya tienes cuenta? <a th:href="@{/login}">Vuelve al login</a></p>
    </div>
</div>
</body>
</html>
