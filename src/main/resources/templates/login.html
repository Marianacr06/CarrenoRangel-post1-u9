<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Spring Security 6</p>
        <h1>Iniciar sesión</h1>
        <p class="subtitle">Accede con tus credenciales para entrar a tu panel protegido.</p>

        <div class="alert success" th:if="${param.registered}">Usuario registrado correctamente. Ya puedes iniciar sesión.</div>
        <div class="alert error" th:if="${param.error}">Credenciales inválidas.</div>
        <div class="alert success" th:if="${param.logout}">Sesión cerrada correctamente.</div>

        <form th:action="@{/login}" method="post" class="form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                <span>Usuario</span>
                <input type="text" name="username" placeholder="Tu usuario" required>
            </label>
            <label>
                <span>Contraseña</span>
                <input type="password" name="password" placeholder="Tu contraseña" required>
            </label>
            <button type="submit" class="primary-btn">Entrar</button>
        </form>

        <p class="helper">¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a></p>
    </div>
</div>
</body>
</html>
